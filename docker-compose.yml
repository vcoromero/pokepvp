services:
  mongo:
    image: mongo:7
    container_name: pokepvp-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: pokepvp
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-devpassword}
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
